# CI/CD pipeline for California Housing Predictor
# runs tests on push, then deploys to HF Spaces if tests pass

name: CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check imports
        run: |
          python -c "import fastapi; import sklearn; import pandas; import gradio; import joblib; import huggingface_hub; print('imports ok')"

      - name: Lint
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=venv,__pycache__ || true

  deploy:
    name: Deploy to HF Spaces
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          rm -rf plots
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add -A
          git commit -m "Remove plots folder for HF Space deployment" --allow-empty
          git remote add space https://Shaddy001:$HF_TOKEN@huggingface.co/spaces/Shaddy001/california-housing-predictor
          git push --force space main
